<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .wrapper { width:100%; max-width:420px; animation:fadeInUp 0.55s ease forwards; }
        .header { text-align:center; margin-bottom:24px; }
        .title { font-size:1.3rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
        .sub { color:var(--text-muted); font-size:0.87rem; }
        .card { padding:28px 24px; }
        .pass-wrapper { position:relative; }
        .pass-wrapper .form-input { padding-left:40px; }
        .show-pass { position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:0.9rem; padding:4px; transition:var(--transition); }
        .show-pass:hover { color:var(--primary); }
        .success-msg { display:none; background:rgba(16,185,129,0.12); color:#6ee7b7; border:1px solid rgba(16,185,129,0.3); padding:12px 16px; border-radius:var(--radius-sm); margin-bottom:16px; font-size:0.88rem; font-weight:600; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="wrapper">
        <div class="header">
            <div class="title">🔐 تغيير كلمة المرور</div>
            <p class="sub">أدخل كلمة المرور الجديدة</p>
        </div>
        <div class="glass-card card">
            <div id="success" class="success-msg">✅ تم تغيير كلمة المرور بنجاح!</div>
            <div id="error" class="alert alert-error" style="display:none; margin-bottom:16px;"></div>

            <form id="changePassForm">
                <div class="form-group">
                    <label class="form-label">كلمة المرور الحالية</label>
                    <div class="pass-wrapper">
                        <input type="password" id="oldPass" class="form-input" placeholder="أدخل كلمة المرور الحالية" required>
                        <button type="button" class="show-pass" onclick="toggle('oldPass')">👁</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">كلمة المرور الجديدة</label>
                    <div class="pass-wrapper">
                        <input type="password" id="newPass" class="form-input" placeholder="أدخل كلمة المرور الجديدة" required>
                        <button type="button" class="show-pass" onclick="toggle('newPass')">👁</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">تأكيد كلمة المرور الجديدة</label>
                    <div class="pass-wrapper">
                        <input type="password" id="confirmPass" class="form-input" placeholder="أدخل كلمة المرور مرة أخرى" required>
                        <button type="button" class="show-pass" onclick="toggle('confirmPass')">👁</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">حفظ كلمة المرور الجديدة</button>
            </form>

            <a href="javascript:history.back()" style="display:block; text-align:center; margin-top:16px; color:var(--text-muted); font-size:0.85rem; text-decoration:none; transition:var(--transition);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">← العودة</a>
        </div>
    </div>

    <script>
        function toggle(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('changePassForm').onsubmit = async (e) => {
            e.preventDefault();
            const old = document.getElementById('oldPass').value;
            const newP = document.getElementById('newPass').value;
            const conf = document.getElementById('confirmPass').value;

            const errEl = document.getElementById('error');
            errEl.style.display = 'none';

            if (newP !== conf) {
                errEl.style.display = 'flex';
                errEl.textContent = '⚠️ كلمات المرور الجديدة غير متطابقة';
                return;
            }

            if (newP.length < 4) {
                errEl.style.display = 'flex';
                errEl.textContent = '⚠️ كلمة المرور يجب أن تكون 4 أحرف على الأقل';
                return;
            }

            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oldPassword: old, newPassword: newP })
            });

            if (res.ok) {
                document.getElementById('success').style.display = 'block';
                document.getElementById('changePassForm').reset();
                setTimeout(() => window.location.href = '/', 2000);
            } else {
                const data = await res.json();
                errEl.style.display = 'flex';
                errEl.textContent = '⚠️ ' + (data.error || 'خطأ في تغيير كلمة المرور');
            }
        };
    </script>
</body>
</html>
