<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suez Sons | تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-wrapper { width:100%; max-width:400px; animation:fadeInUp 0.55s ease forwards; }
        .login-header { text-align:center; margin-bottom:28px; }
        .login-logo { font-size:2.6rem; font-weight:900; color:var(--primary); font-family:'Tajawal',sans-serif; }
        .login-sub { color:var(--text-muted); font-size:0.88rem; margin-top:5px; }
        .type-badge {
            display:inline-flex; align-items:center; gap:6px;
            padding:6px 14px; border-radius:50px; font-size:0.82rem; font-weight:700;
            margin-bottom:20px;
        }
        .pass-wrapper { position:relative; }
        .pass-wrapper .form-input { padding-left:42px; }
        .show-pass-btn {
            position:absolute; left:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; color:var(--text-muted);
            font-size:0.95rem; padding:4px; transition:var(--transition);
        }
        .show-pass-btn:hover { color:var(--primary); }
        .back-link { display:block; text-align:center; margin-top:18px; color:var(--text-muted); font-size:0.83rem; text-decoration:none; transition:var(--transition); }
        .back-link:hover { color:var(--primary); }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="login-logo">☀️ Suez Sons</div>
            <p class="login-sub" id="login-sub">أدخل بياناتك للمتابعة</p>
        </div>

        <div class="glass-card" style="padding:32px 28px;">
            <div style="text-align:center; margin-bottom:20px;">
                <span class="type-badge" id="type-badge">...</span>
            </div>

            <div id="error-msg" class="alert alert-error" style="display:none; margin-bottom:18px;">
                ⚠️ اسم المستخدم أو كلمة المرور غير صحيحة
            </div>

            <form id="loginForm">
                <input type="hidden" name="type" id="loginType">
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" name="username" id="username" class="form-input"
                           placeholder="أدخل اسم المستخدم" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <div class="pass-wrapper">
                        <input type="password" name="password" id="password" class="form-input"
                               placeholder="أدخل كلمة المرور" required>
                        <button type="button" class="show-pass-btn" onclick="togglePass()">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:6px;" id="submit-btn">
                    دخول →
                </button>
            </form>
        </div>
        <a href="/" class="back-link">← العودة للرئيسية</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'admin';
        document.getElementById('loginType').value = type;

        const typeConfig = {
            admin:    { label: '👑 أدمن', color: 'badge-warning', action: '/login/admin' },
            store:    { label: '🏪 صاحب محل', color: 'badge-info', action: '/login/store' },
            employee: { label: '👤 موظف', color: 'badge-success', action: '/login/employee' }
        };
        const cfg = typeConfig[type] || typeConfig.admin;
        const badge = document.getElementById('type-badge');
        badge.textContent = cfg.label;
        badge.className = 'type-badge badge ' + cfg.color;

        if (params.has('error')) document.getElementById('error-msg').style.display = 'flex';

        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = '...جاري التحقق'; btn.disabled = true;

            const formData = new FormData(this);
            const res = await fetch(cfg.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: formData.get('username'),
                    password: formData.get('password')
                })
            });

            if (res.ok) {
                const data = await res.json();
                window.location.href = data.redirect;
            } else {
                document.getElementById('error-msg').style.display = 'flex';
                btn.textContent = 'دخول →'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
