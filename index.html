<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suez Sons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animated"></div>
    <section class="hero-section">
        <div class="hero-content">
            <div class="hero-logo">☀️ Suez Sons</div>
            <p class="hero-tagline">نظام إدارة الموظفين والموردين</p>
            <div class="glass-card" style="padding:36px 30px; margin-bottom:24px;">
                <h2 style="font-size:1.2rem; margin-bottom:6px;">أهلاً بك 👋</h2>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:26px;">اختر نوع حسابك للمتابعة</p>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <a href="/login.html?type=admin" class="btn btn-primary" style="font-size:1rem;">
                        👑 دخول كأدمن
                    </a>
                    <a href="/login.html?type=store" class="btn" style="background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.3); font-size:1rem;">
                        🏪 دخول كصاحب محل
                    </a>
                    <a href="/login.html?type=employee" class="btn" style="background:rgba(16,185,129,0.1);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25); font-size:1rem;">
                        👤 دخول كموظف
                    </a>
                </div>
            </div>
            <p style="color:var(--text-muted); font-size:0.75rem; opacity:0.5;">Suez Sons © 2025 — جميع الحقوق محفوظة</p>
        </div>
    </section>
</body>
</html>
